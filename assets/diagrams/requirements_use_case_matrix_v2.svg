<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="1280" viewBox="0 0 1280 1280" role="img" aria-label="Use case overview matrix showing which actors are involved in the main Ambience-AI-1.5 use cases">
  <rect width="1280" height="1280" fill="#f6f8fc"/>

  <style>
    .title { font: 700 30px Arial, sans-serif; fill: #143d6b; }
    .subtitle { font: 400 16px Arial, sans-serif; fill: #52667d; }
    .header { font: 700 20px Arial, sans-serif; fill: #143d6b; }
    .rowlabel { font: 600 17px Arial, sans-serif; fill: #143d6b; }
    .celltext { font: 700 17px Arial, sans-serif; fill: #143d6b; text-anchor: middle; dominant-baseline: middle; }
    .note { font: 400 15px Arial, sans-serif; fill: #52667d; }
    .card { fill: #ffffff; stroke: #d9e2ec; stroke-width: 2; }
    .header-cell { fill: #eaf2ff; stroke: #143d6b; stroke-width: 2.5; }
    .row-cell { fill: #f7fbff; stroke: #d9e2ec; stroke-width: 2; }
    .yes-cell { fill: #dff3e6; stroke: #1f6f4a; stroke-width: 2; }
    .no-cell { fill: #f4f6f8; stroke: #d9e2ec; stroke-width: 2; }
  </style>

  <rect x="40" y="40" width="1200" height="1200" rx="24" class="card"/>

  <text x="80" y="92" class="title">Use case overview</text>
  <text x="80" y="122" class="subtitle">This matrix summarises which actors are involved in the main use cases captured by the final requirements baseline.</text>
  <text x="80" y="146" class="subtitle">It also highlights the later platform features that became explicit during iterative refinement.</text>

  <!-- Header row -->
  <rect x="80" y="190" width="470" height="64" rx="16" class="header-cell"/>
  <rect x="590" y="190" width="180" height="64" rx="16" class="header-cell"/>
  <rect x="790" y="190" width="180" height="64" rx="16" class="header-cell"/>
  <rect x="990" y="190" width="180" height="64" rx="16" class="header-cell"/>

  <text x="110" y="231" class="header">Main use case</text>
  <text x="680" y="231" text-anchor="middle" class="header">GP</text>
  <text x="880" y="231" text-anchor="middle" class="header">Specialist</text>
  <text x="1080" y="231" text-anchor="middle" class="header">Admin</text>

  <!-- Row 1 -->
  <rect x="80" y="274" width="470" height="64" rx="14" class="row-cell"/>
  <rect x="590" y="274" width="180" height="64" rx="14" class="yes-cell"/>
  <rect x="790" y="274" width="180" height="64" rx="14" class="yes-cell"/>
  <rect x="990" y="274" width="180" height="64" rx="14" class="yes-cell"/>
